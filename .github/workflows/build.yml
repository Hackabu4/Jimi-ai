name: Jimi AI Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04 # LTS нұсқасы тұрақтылық үшін

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Install system dependencies
      run: |
        sudo apt-get update
        # Libtinfo5 орнына жаңа нұсқадағы балама пакеттер
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
        autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncurses5 \
        libffi-dev libssl-dev

    - name: Build APK
      run: |
        # SDK лицензиясын автоматты түрде қабылдау
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Buildozer арқылы APK жинау
        buildozer android debug

    - name: Upload artifact
      if: always() # Сәтсіз болса да нәтижені сақтаймыз (Debug үшін)
      uses: actions/upload-artifact@v4
      with:
        name: Jimi-APK
        path: bin/*.apk
