name: Jimi AI Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04 # Жаңа нұсқалармен үйлесімділік үшін ескірмеген нұсқаны таңдаймыз

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Install system dependencies
      run: |
        sudo apt-get update
        # libtinfo5 орнына libncurses5 қолданамыз, себебі жаңа Ubuntu-да ол стандартты
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncurses5

    - name: Build APK with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      if: always() # Билд сәтсіз болса да, логтарды немесе бар артефактілерді көру үшін
      uses: actions/upload-artifact@v4
      with:
        name: Jimi-APK
        path: bin/*.apk
