name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Debug - List files
      run: ls -R  # Жоба құрылымын көру үшін қосылды (қатенің қайда екенін дәл табуға көмектеседі)

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew build --stacktrace --warning-mode all
        else
          echo "gradlew not found, attempting to use installed gradle"
          gradle build --stacktrace --warning-mode all
        fi

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jimi-build-output
        path: build/libs/*.jar
